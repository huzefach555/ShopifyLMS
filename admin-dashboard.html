<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head></head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #1a1a1a;
        --surface: #2d2d2d;
        --surface-strong: #3d3d3d;
        --border: #4a4a4a;
        --text: #ffffff;
        --muted: #a0a0a0;
        --primary: #ff6b35;
        --primary-rgb: 255, 107, 53;
        --success: #10b981;
        --success-rgb: 16, 185, 129;
        --danger: #ef4444;
        --danger-rgb: 239, 68, 68;
        --warning: #f59e0b;
        --warning-rgb: 245, 158, 11;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      .dashboard-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 0;
      }

      .sidebar {
        background: var(--surface);
        border-right: 1px solid var(--border);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text);
        text-decoration: none;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
      }

      .brand-mark {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, var(--primary), var(--warning));
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.25rem;
      }

      .nav-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.875rem 1rem;
        border-radius: 12px;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.2s ease;
        font-weight: 500;
        border: none;
        background: transparent;
        width: 100%;
        text-align: left;
      }

      .nav-item:hover {
        background: var(--surface-strong);
        color: var(--text);
      }

      .nav-item.active {
        background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.15), rgba(var(--warning-rgb), 0.1));
        color: var(--primary);
        border: 1px solid rgba(var(--primary-rgb), 0.3);
      }

      .main-panel {
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .page-title {
        font-size: 1.875rem;
        font-weight: 700;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1.5rem;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 1rem;
      }

      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .stat-value {
        font-size: 2rem;
        font-weight: 700;
        color: var(--primary);
      }

      .stat-label {
        color: var(--muted);
        font-size: 0.875rem;
      }

      .table-container {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
      }

      .table-header {
        padding: 1.5rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .table-title {
        font-size: 1.25rem;
        font-weight: 600;
      }

      .table-actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .search-input {
        padding: 0.625rem 1rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-strong);
        color: var(--text);
        font-size: 0.875rem;
        min-width: 200px;
      }

      .search-input:focus {
        outline: none;
        border-color: var(--primary);
      }

      .btn {
        padding: 0.625rem 1.25rem;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 0.875rem;
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--primary), var(--warning));
        color: white;
      }

      .btn-primary:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      .btn-secondary {
        background: var(--surface-strong);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .btn-secondary:hover {
        background: var(--border);
      }

      .btn-success {
        background: rgba(var(--success-rgb), 0.2);
        color: var(--success);
        border: 1px solid rgba(var(--success-rgb), 0.3);
      }

      .btn-success:hover {
        background: rgba(var(--success-rgb), 0.3);
      }

      .btn-danger {
        background: rgba(var(--danger-rgb), 0.2);
        color: var(--danger);
        border: 1px solid rgba(var(--danger-rgb), 0.3);
      }

      .btn-danger:hover {
        background: rgba(var(--danger-rgb), 0.3);
      }

      .data-table {
        width: 100%;
        border-collapse: collapse;
      }

      .data-table th,
      .data-table td {
        padding: 1rem 1.5rem;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }

      .data-table th {
        background: var(--surface-strong);
        font-weight: 600;
        color: var(--muted);
        font-size: 0.875rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .data-table tr:hover {
        background: var(--surface-strong);
      }

      .data-table tr:last-child td {
        border-bottom: none;
      }

      .status-badge {
        display: inline-flex;
        padding: 0.375rem 0.75rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .status-badge.pending {
        background: rgba(var(--warning-rgb), 0.2);
        color: var(--warning);
      }

      .status-badge.approved,
      .status-badge.verified {
        background: rgba(var(--success-rgb), 0.2);
        color: var(--success);
      }

      .status-badge.rejected {
        background: rgba(var(--danger-rgb), 0.2);
        color: var(--danger);
      }

      .student-card {
        background: var(--surface-strong);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1rem;
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 1.5rem;
        align-items: center;
      }

      .student-avatar {
        width: 60px;
        height: 60px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--primary), var(--warning));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        font-weight: 700;
      }

      .student-info {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .student-name {
        font-weight: 600;
        font-size: 1.125rem;
      }

      .student-details {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        color: var(--muted);
        font-size: 0.875rem;
      }

      .student-actions {
        display: flex;
        gap: 0.5rem;
      }

      .payment-screenshot {
        max-width: 300px;
        max-height: 200px;
        border-radius: 8px;
        border: 1px solid var(--border);
        margin-top: 1rem;
      }

      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
      }

      .modal-overlay.active {
        opacity: 1;
        visibility: visible;
      }

      .modal {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 2rem;
        max-width: 500px;
        width: 90%;
        transform: translateY(20px);
        transition: transform 0.3s ease;
      }

      .modal-overlay.active .modal {
        transform: translateY(0);
      }

      .modal-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 1rem;
      }

      .modal-body {
        margin-bottom: 1.5rem;
      }

      .form-group {
        margin-bottom: 1rem;
      }

      .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--muted);
      }

      .form-input,
      .form-textarea,
      .form-select {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-strong);
        color: var(--text);
        font-size: 0.875rem;
      }

      .form-textarea {
        min-height: 100px;
        resize: vertical;
      }

      .form-input:focus,
      .form-textarea:focus,
      .form-select:focus {
        outline: none;
        border-color: var(--primary);
      }

      .modal-footer {
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
      }

      .empty-state {
        text-align: center;
        padding: 3rem;
        color: var(--muted);
      }

      .empty-state-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
      }

      @media (max-width: 1024px) {
        .dashboard-shell {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: fixed;
          left: -100%;
          transition: left 0.3s ease;
          z-index: 100;
        }

        .sidebar.open {
          left: 0;
        }

        .student-card {
          grid-template-columns: 1fr;
          text-align: center;
        }

        .student-actions {
          justify-content: center;
        }

        .student-details {
          justify-content: center;
        }
      }

      @media (max-width: 768px) {
        .main-panel {
          padding: 1rem;
        }

        .table-container {
          overflow-x: auto;
        }

        .data-table {
          min-width: 600px;
        }

        .stats-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="dashboard-shell">
      <aside class="sidebar">
        <a class="brand" href="./index.html">
          <span class="brand-mark">A</span>
          <span>Admin Hub</span>
        </a>
        <div class="nav-list" id="navList"></div>
      </aside>
      <main class="main-panel">
        <div class="topbar">
          <h1 class="page-title" id="pageTitle">Dashboard</h1>
          <div class="table-actions">
            <button class="btn btn-secondary" id="logoutBtn">Logout</button>
          </div>
        </div>
        <div class="stats-grid" id="statsGrid"></div>
        <div id="contentArea"></div>
      </main>
    </div>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <h2 class="modal-title" id="modalTitle">Modal Title</h2>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer" id="modalFooter"></div>
      </div>
    </div>

    <script type="module">
      import { initAuth, authLogout, requireAuth } from './js/auth.js';
      
      await initAuth();
      if (!requireAuth('admin')) {
        return;
      }

      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await authLogout();
        window.location.href = './login.html';
      });
    </script>
    <script type="module" src="./js/admin-dashboard.js"></script>
  </body>
</html>
