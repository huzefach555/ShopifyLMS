<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <style>
      body{display:grid;place-items:center;min-height:100vh;padding:1rem;background:var(--bg)}
      .auth-card{width:min(460px,100%);padding:2rem;border-radius:28px;background:var(--surface);backdrop-filter:blur(16px);border:1px solid var(--border);box-shadow:var(--shadow)}
      .auth-card h1{margin-top:0}.field{display:grid;gap:.35rem;margin-bottom:.9rem}.field input,.field select{width:100%;padding:.84rem .95rem;border:1px solid var(--border);border-radius:14px;background:var(--surface-strong);color:var(--text)}.actions{display:flex;justify-content:space-between;align-items:center;gap:.8rem;flex-wrap:wrap}.msg{min-height:1rem;margin-top:.8rem;color:#EF4444;font-size:.92rem}
      .popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:50;}
      .popup-overlay.show{display:flex;}
      .popup-card{width:min(420px,100%);background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:1.5rem;box-shadow:var(--shadow);text-align:left;}
      .popup-card h2{margin:0 0 .75rem;font-size:1.15rem;}
      .popup-card p{margin:.5rem 0;line-height:1.5;}
      .popup-close{margin-top:1rem;padding:.75rem 1rem;background:var(--primary);color:#fff;border:none;border-radius:14px;cursor:pointer;width:100%;}
      @media (max-width:480px){.auth-card{padding:1.5rem}}
      @media (max-width:375px){.auth-card{padding:1.2rem}}
    </style>
  </head>
  <body>
    <div class="auth-card">
      <h1>Sign In</h1>
      <form id="loginForm">
        <label class="field"><span>Email</span><input name="email" type="email" required /></label>
        <label class="field"><span>Password</span><input name="password" type="password" required /></label>
        <!-- Role is determined server-side; do not allow client role selection -->
        <div class="actions"><button class="btn btn-primary" type="submit">Login</button><a href="./register.html">Create account</a></div>
      </form>
      <div class="msg" id="msg" aria-live="polite"></div>
      <button type="button" class="btn btn-secondary" id="resetLink">Reset password</button>
    </div>
  </div>

  <div class="popup-overlay" id="loginPopup" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
    <div class="popup-card">
      <h2 id="popupTitle">Payment Submitted</h2>
      <p id="popupContent">Your payment has been received and is awaiting admin approval. You can login again after approval.</p>
      <button type="button" class="popup-close" id="popupClose">Okay</button>
    </div>
  </div>

  <script>
    // Theme persistence
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <script type="module" src="./js/login.js"></script>
  </body>
</html>
