<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
    <style>
      body{background:radial-gradient(circle at top left,rgba(36,183,167,0.16),transparent 26%),var(--bg)}
      .dashboard-shell{min-height:100vh;display:grid;grid-template-columns:280px 1fr;padding:1rem;gap:1rem}
      .sidebar,.main-panel{background:var(--surface);backdrop-filter:blur(16px);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:28px}
      .sidebar{padding:1.2rem;display:flex;flex-direction:column;gap:1rem}
      .nav-list{display:grid;gap:.4rem}
      .nav-item{display:flex;align-items:center;justify-content:space-between;padding:.82rem .95rem;border-radius:16px;color:var(--muted);cursor:pointer;transition:all .2s ease}
      .nav-item.active,.nav-item:hover{background:var(--surface-strong);color:var(--text)}
      .main-panel{padding:1.2rem;display:flex;flex-direction:column;gap:1rem}
      .topbar{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap}
      .hero-card{display:grid;grid-template-columns:1.2fr .8fr;gap:1rem;padding:1.1rem;border-radius:24px;background:linear-gradient(135deg,rgba(36,183,167,.16),rgba(109,74,255,.14));border:1px solid var(--border)}
      .stats-grid,.grid-2{display:grid;gap:1rem}.stats-grid{grid-template-columns:repeat(4,1fr)}.grid-2{grid-template-columns:repeat(2,1fr)}
      .card{padding:1rem;border-radius:22px;background:var(--surface-strong);border:1px solid var(--border)}
      .pill{display:inline-flex;padding:.35rem .7rem;border-radius:999px;background:rgba(36,183,167,.12);color:var(--primary-2);font-size:.8rem;font-weight:700}
      .muted{color:var(--muted)}
      .list{display:grid;gap:.7rem}.item{display:flex;justify-content:space-between;align-items:center;padding:.7rem 0;border-bottom:1px solid var(--border)}.item:last-child{border-bottom:0}
      .badge{display:inline-flex;padding:.35rem .65rem;border-radius:999px;background:var(--surface);color:var(--primary);font-size:.8rem}
      .task-card{display:grid;gap:1rem}
      .task-form{display:grid;gap:.75rem}
      .task-form input,.task-form textarea,.task-form select,.task-form button{width:100%;padding:.8rem .9rem;border-radius:14px;border:1px solid var(--border);background:var(--surface-strong)}
      .task-form button{cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border:0;font-weight:700}
      .task-list{display:grid;gap:.7rem}
      .task-item{display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:.8rem 0;border-bottom:1px solid var(--border)}
      .task-item:last-child{border-bottom:0}
      .task-actions{display:flex;gap:.5rem;flex-wrap:wrap}
      .action-btn{padding:.5rem .8rem;border:none;border-radius:999px;cursor:pointer;background:rgba(109,74,255,.12);color:var(--primary);font-weight:700}
      .action-btn.danger{background:rgba(194,59,59,.14);color:#c23b3b}
      .progress-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
      .progress-card{padding:1rem;border:1px solid var(--border);border-radius:18px;background:var(--surface-strong)}
      .progress-form{display:grid;gap:.6rem;margin-top:.6rem}
      .progress-form input,.progress-form textarea,.progress-form button{width:100%;padding:.7rem .8rem;border-radius:12px;border:1px solid var(--border);background:var(--surface)}
      .progress-form button{cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border:0;font-weight:700}
      @media (max-width:980px){.dashboard-shell{grid-template-columns:1fr}.sidebar{order:2}}@media (max-width:720px){.stats-grid,.grid-2,.hero-card,.task-item{grid-template-columns:1fr}.task-item{flex-direction:column;align-items:flex-start}}
    </style>
  </head>
  <body>
    <div class="dashboard-shell">
      <aside class="sidebar">
        <a class="brand" href="./index.html"><span class="brand-mark">T</span><span>Teacher Hub</span></a>
        <div class="nav-list" id="navList"></div>
        <div class="card">
          <h3>Next Live Session</h3>
          <p class="muted">Friday • 6:30 PM</p>
        </div>
      </aside>
      <main class="main-panel">
        <div class="topbar">
          <div>
            <span class="pill">Teacher Dashboard</span>
            <h2 id="pageTitle">Dashboard</h2>
          </div>
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☀</button>
        </div>
        <section class="hero-card">
          <div>
            <h3 id="welcomeMessage">Welcome</h3>
            <p class="muted">Manage students, tasks, notes, and class progress from one premium workspace.</p>
          </div>
          <div class="card">
            <strong>Weekly Summary</strong>
            <p class="muted" id="weeklySummary">Loading...</p>
          </div>
        </section>
        <section class="stats-grid" id="statsGrid"></section>
        <section id="contentArea"></section>
      </main>
    </div>
    <script type="module">
      import { protect } from './js/protected.js';
      import { authLogout, initAuth } from './js/auth.js';
      await initAuth();
      protect('teacher');
      document.addEventListener('click', async (event) => {
        const target = event.target.closest('[data-id="logout"]');
        if (!target) return;
        await authLogout();
        window.location.href = './login.html';
      });
    </script>
    <script type="module" src="./js/teacher-dashboard.js"></script>
  </body>
</html>
