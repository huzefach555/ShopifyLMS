<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
    <style>
      body{background:radial-gradient(circle at top left,rgba(255,107,53,0.08),transparent 40%),radial-gradient(circle at bottom right,rgba(245,158,11,0.06),transparent 40%),var(--bg)}
      .dashboard-shell{min-height:100vh;display:grid;grid-template-columns:270px 1fr;padding:1.5rem;gap:1.5rem}
      .sidebar,.main-panel{background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);box-shadow:var(--shadow);border-radius:32px}
      .sidebar{padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
      .sidebar .brand{margin-bottom:.5rem}
      .nav-list{display:grid;gap:.5rem}
      .nav-item{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.1rem;border-radius:18px;color:var(--muted);cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);background:transparent;border:1px solid transparent}
      .nav-item:hover{background:var(--surface);color:var(--text);transform:translateX(4px)}
      .nav-item.active{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;box-shadow:0 4px 20px rgba(255,107,53,0.3)}
      .main-panel{padding:1.5rem;display:flex;flex-direction:column;gap:1.5rem}
      .topbar{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap}
      .hero-card{display:grid;grid-template-columns:1.2fr .8fr;gap:1.5rem;padding:1.5rem;border-radius:28px;background:linear-gradient(135deg,rgba(255,107,53,.15),rgba(245,158,11,.1));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);box-shadow:var(--shadow)}
      .stats-grid,.resource-grid,.task-grid{display:grid;gap:1rem}
      .stats-grid{grid-template-columns:repeat(4,1fr)}
      .card{padding:1.25rem;border-radius:24px;background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);box-shadow:var(--shadow);transition:transform .3s ease,box-shadow .3s ease}
      .card:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(255,107,53,0.15)}
      .resource-grid{grid-template-columns:repeat(2,1fr)}
      .task-grid{grid-template-columns:repeat(2,1fr)}
      .progress-bar{height:.6rem;border-radius:999px;background:rgba(255,107,53,.12);overflow:hidden;margin-top:.7rem}
      .progress-bar span{display:block;height:100%;width:72%;background:linear-gradient(135deg,var(--primary),var(--primary-2));border-radius:inherit;transition:width .4s ease}
      .pill{display:inline-flex;padding:.4rem .8rem;border-radius:999px;background:linear-gradient(135deg,rgba(255,107,53,.15),rgba(245,158,11,.1));color:var(--primary);font-size:.85rem;font-weight:700;border:1px solid rgba(255,107,53,0.2)}
      .muted{color:var(--muted)}
      .table-list{display:grid;gap:.8rem}
      .table-item{display:flex;justify-content:space-between;align-items:center;padding:1rem 0;border-bottom:1px solid var(--border);transition:background .2s ease}
      .table-item:hover{background:var(--surface);padding-left:.5rem;padding-right:.5rem;border-radius:12px}
      .table-item:last-child{border-bottom:0}
      .badge{display:inline-flex;padding:.4rem .75rem;border-radius:999px;background:var(--surface);color:var(--primary);font-size:.85rem;font-weight:600;border:1px solid var(--border)}
      .payment-form{display:grid;gap:1rem}
      .payment-form input,.payment-form select,.payment-form button{width:100%;padding:.9rem 1rem;border-radius:16px;border:1px solid var(--border);background:var(--surface-strong);transition:all .3s ease}
      .payment-form input:focus,.payment-form select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,107,53,0.15);outline:none}
      .payment-form button{cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border:0;font-weight:700;transition:transform .2s ease,box-shadow .2s ease}
      .payment-form button:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(255,107,53,0.4)}
      .status{font-size:.92rem;font-weight:600}.status.error{color:#c23b3b}.status.success{color:#1f9d73}
      .task-section{display:grid;gap:1rem}
      .task-item{display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--border)}
      .progress-bar-large{height:.8rem;border-radius:999px;background:rgba(255,107,53,.12);overflow:hidden;margin:1rem 0}
      .progress-bar-large span{display:block;height:100%;background:linear-gradient(135deg,var(--primary),var(--primary-2));transition:width .4s ease}
      .task-item:last-child{border-bottom:0}
      .action-btn{padding:.6rem 1rem;border:none;border-radius:999px;cursor:pointer;background:linear-gradient(135deg,rgba(255,107,53,.15),rgba(245,158,11,.1));color:var(--primary);font-weight:700;transition:all .3s ease;border:1px solid rgba(255,107,53,0.2)}
      .action-btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(255,107,53,0.3)}
      @media (max-width:720px){.task-item{flex-direction:column;align-items:flex-start}}
      .progress-track{display:none;height:.6rem;border-radius:999px;background:rgba(255,107,53,.12);overflow:hidden;margin-top:.3rem}
      .progress-track span{display:block;height:100%;width:0;background:linear-gradient(135deg,var(--primary),var(--primary-2));transition:width .3s ease}
      @media (max-width:980px){.dashboard-shell{grid-template-columns:1fr}.sidebar{order:2}}@media (max-width:720px){.stats-grid,.resource-grid,.task-grid,.hero-card{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <div class="dashboard-shell">
      <aside class="sidebar">
        <a class="brand" href="./index.html"><span class="brand-mark">S</span><span>Student Hub</span></a>
        <div class="nav-list" id="navList"></div>
        <div class="card">
          <h3>Today</h3>
          <p class="muted">Live class at 7:00 PM</p>
        </div>
      </aside>
      <main class="main-panel">
        <div class="topbar">
          <div>
            <span class="pill">Student Dashboard</span>
            <h2 id="pageTitle">Dashboard</h2>
          </div>
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☀</button>
        </div>
        <section class="hero-card">
          <div>
            <h3 id="welcomeMessage">Welcome back</h3>
            <p class="muted">Your Shopify learning path is progressing smoothly. Keep going and unlock your next milestone.</p>
          </div>
          <div class="card">
            <strong>Course Progress</strong>
            <div class="progress-bar"><span id="heroProgressBar"></span></div>
            <p class="muted" id="heroProgressText">Loading...</p>
          </div>
        </section>
        <section class="stats-grid" id="statsGrid"></section>
        <section id="contentArea"></section>
      </main>
    </div>
    <script type="module">
      import { protect } from './js/protected.js';
      import { authLogout, initAuth } from './js/auth.js';
      await initAuth();
      protect('student');
      document.addEventListener('click', async (event) => {
        const target = event.target.closest('[data-id="logout"]');
        if (!target) return;
        await authLogout();
        window.location.href = './login.html';
      });
    </script>
    <script type="module" src="./js/student-dashboard.js"></script>
  </body>
</html>
