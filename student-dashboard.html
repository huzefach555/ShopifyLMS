<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
    <style>
      body{background:radial-gradient(circle at top left,rgba(109,74,255,0.14),transparent 25%),var(--bg)}
      .dashboard-shell{min-height:100vh;display:grid;grid-template-columns:270px 1fr;padding:1rem;gap:1rem}
      .sidebar,.main-panel{background:var(--surface);backdrop-filter:blur(18px);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:28px}
      .sidebar{padding:1.3rem;display:flex;flex-direction:column;gap:1rem}
      .sidebar .brand{margin-bottom:.5rem}
      .nav-list{display:grid;gap:.4rem}
      .nav-item{display:flex;align-items:center;justify-content:space-between;padding:.8rem .95rem;border-radius:16px;color:var(--muted);cursor:pointer;transition:all .2s ease}
      .nav-item.active,.nav-item:hover{background:var(--surface-strong);color:var(--text)}
      .main-panel{padding:1.2rem;display:flex;flex-direction:column;gap:1rem}
      .topbar{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap}
      .hero-card{display:grid;grid-template-columns:1.2fr .8fr;gap:1rem;padding:1.2rem;border-radius:24px;background:linear-gradient(135deg,rgba(109,74,255,.16),rgba(36,183,167,.12));border:1px solid var(--border)}
      .stats-grid,.resource-grid,.task-grid{display:grid;gap:1rem}
      .stats-grid{grid-template-columns:repeat(4,1fr)}
      .card{padding:1rem;border-radius:22px;background:var(--surface-strong);border:1px solid var(--border)}
      .resource-grid{grid-template-columns:repeat(2,1fr)}
      .task-grid{grid-template-columns:repeat(2,1fr)}
      .progress-bar{height:.5rem;border-radius:999px;background:rgba(109,74,255,.15);overflow:hidden;margin-top:.6rem}
      .progress-bar span{display:block;height:100%;width:72%;background:linear-gradient(135deg,var(--primary),var(--primary-2));border-radius:inherit}
      .pill{display:inline-flex;padding:.35rem .7rem;border-radius:999px;background:rgba(109,74,255,.12);color:var(--primary);font-size:.8rem;font-weight:700}
      .muted{color:var(--muted)}
      .table-list{display:grid;gap:.7rem}
      .table-item{display:flex;justify-content:space-between;align-items:center;padding:.75rem 0;border-bottom:1px solid var(--border)}
      .table-item:last-child{border-bottom:0}
      .badge{display:inline-flex;padding:.35rem .65rem;border-radius:999px;background:var(--surface);color:var(--primary);font-size:.8rem}
      .payment-form{display:grid;gap:.85rem}
      .payment-form input,.payment-form select,.payment-form button{width:100%;padding:.8rem .9rem;border-radius:14px;border:1px solid var(--border);background:var(--surface-strong)}
      .payment-form button{cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border:0;font-weight:700}
      .status{font-size:.92rem;font-weight:600}.status.error{color:#c23b3b}.status.success{color:#1f9d73}
      .task-section{display:grid;gap:1rem}
      .task-item{display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:.8rem 0;border-bottom:1px solid var(--border)}
      .progress-bar-large{height:.7rem;border-radius:999px;background:rgba(109,74,255,.15);overflow:hidden;margin:.8rem 0}
      .progress-bar-large span{display:block;height:100%;background:linear-gradient(135deg,var(--primary),var(--primary-2));transition:width .2s ease}
      .task-item:last-child{border-bottom:0}
      .action-btn{padding:.5rem .8rem;border:none;border-radius:999px;cursor:pointer;background:rgba(109,74,255,.12);color:var(--primary);font-weight:700}
      @media (max-width:720px){.task-item{flex-direction:column;align-items:flex-start}}
      .progress-track{display:none;height:.55rem;border-radius:999px;background:rgba(109,74,255,.15);overflow:hidden;margin-top:.25rem}
      .progress-track span{display:block;height:100%;width:0;background:linear-gradient(135deg,var(--primary),var(--primary-2));transition:width .2s ease}
      @media (max-width:980px){.dashboard-shell{grid-template-columns:1fr}.sidebar{order:2}}@media (max-width:720px){.stats-grid,.resource-grid,.task-grid,.hero-card{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <div class="dashboard-shell">
      <aside class="sidebar">
        <a class="brand" href="./index.html"><span class="brand-mark">S</span><span>Student Hub</span></a>
        <div class="nav-list" id="navList"></div>
        <div class="card">
          <h3>Today</h3>
          <p class="muted">Live class at 7:00 PM</p>
        </div>
      </aside>
      <main class="main-panel">
        <div class="topbar">
          <div>
            <span class="pill">Student Dashboard</span>
            <h2 id="pageTitle">Dashboard</h2>
          </div>
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☀</button>
        </div>
        <section class="hero-card">
          <div>
            <h3 id="welcomeMessage">Welcome back</h3>
            <p class="muted">Your Shopify learning path is progressing smoothly. Keep going and unlock your next milestone.</p>
          </div>
          <div class="card">
            <strong>Course Progress</strong>
            <div class="progress-bar"><span id="heroProgressBar"></span></div>
            <p class="muted" id="heroProgressText">Loading...</p>
          </div>
        </section>
        <section class="stats-grid" id="statsGrid"></section>
        <section id="contentArea"></section>
      </main>
    </div>
    <script type="module">
      import { protect } from './js/protected.js';
      import { authLogout, initAuth } from './js/auth.js';
      await initAuth();
      protect('student');
      document.addEventListener('click', async (event) => {
        const target = event.target.closest('[data-id="logout"]');
        if (!target) return;
        await authLogout();
        window.location.href = './login.html';
      });
    </script>
    <script type="module" src="./js/student-dashboard.js"></script>
  </body>
</html>
